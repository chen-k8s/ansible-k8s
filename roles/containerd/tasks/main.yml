# roles/containerd/tasks/main.yml

- name: Add Docker CE yum repository
  command: yum-config-manager --add-repo https://mirrors.aliyun.com/docker-ce/linux/centos/docker-ce.repo
  args:
    creates: /etc/yum.repos.d/docker-ce.repo

- name: Install or update docker-ce and containerd
  yum:
    name:
      - docker-ce
      - containerd
    state: latest
    update_cache: yes

- name: Configure containerd kernel modules
  copy:
    dest: /etc/modules-load.d/containerd.conf
    content: |
      overlay
      br_netfilter
    mode: '0644'

- name: Load overlay kernel module
  command: modprobe overlay

- name: Load br_netfilter kernel module
  command: modprobe br_netfilter

- name: Configure sysctl for Kubernetes CRI
  sysctl:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    state: present
    sysctl_file: /etc/sysctl.d/99-kubernetes-cri.conf
    reload: yes
  loop:
    - { name: "net.bridge.bridge-nf-call-iptables", value: "1" }
    - { name: "net.ipv4.ip_forward", value: "1" }
    - { name: "net.bridge.bridge-nf-call-ip6tables", value: "1" }

- name: Create containerd config directory
  file:
    path: /etc/containerd
    state: directory
    mode: '0755'

- name: Generate containerd default config
  shell: containerd config default
  register: containerd_default_config
  changed_when: false

- name: Write containerd config file
  copy:
    content: "{{ containerd_default_config.stdout }}"
    dest: /etc/containerd/config.toml
    force: yes
  notify: restart containerd

- name: Ensure pause image is set to Aliyun mirror
  replace:
    path: /etc/containerd/config.toml
    regexp: '^(\s*sandbox\s*=\s*).*$'
    replace: '\1"registry.cn-hangzhou.aliyuncs.com/google_containers/pause:3.10"'
  notify: restart containerd

- name: Enable systemd cgroup driver
  lineinfile:
    path: /etc/containerd/config.toml
    regexp: '^(#*\s*)?SystemdCgroup\s*=.*$'
    line: 'SystemdCgroup = true'
    state: present
  notify: restart containerd


- name: Alternative - comment out disabled_plugins line if it contains "cri"
  lineinfile:
    path: /etc/containerd/config.toml
    regexp: '^(#*\s*)?disabled_plugins\s*=.*'
    line: '# disabled_plugins = ["cri"]'
    backup: yes
  notify: restart containerd

- name: Start and enable containerd
  systemd:
    name: containerd
    state: started
    enabled: yes
    daemon_reload: yes

- name: Configure crictl
  copy:
    dest: /etc/crictl.yaml
    content: |
      runtime-endpoint: unix:///run/containerd/containerd.sock
      image-endpoint: unix:///run/containerd/containerd.sock
      timeout: 10
      debug: false
    mode: '0644'
