[defaults]
# 主机清单文件（默认路径，也可在命令行 -i 指定）
inventory = inventory.ini

# roles目录
roles_path = /root/ansible-k8s/roles

# 远程执行用户（如果使用 root，则不需要提权）
remote_user = root

# 是否收集 facts（smart 表示按需，首次收集后缓存）
gathering = smart

# 并行执行的主机数（根据控制节点性能调整）
forks = 10

# SSH 连接超时（秒）
timeout = 30

# 开启主机密钥检查（生产环境建议 False，避免首次连接提示）
host_key_checking = False

# 显示跳过的主机任务（减少输出噪音）
display_skipped_hosts = False

# 错误时立即停止整个 playbook（避免集群状态不一致）
any_errors_fatal = True

# 日志路径（统一记录，便于排查）
log_path = /var/log/ansible/k8s-deploy.log

# 控制端 Python 解释器（确保使用 Python3）
interpreter_python = /usr/bin/python3

[ssh_connection]
# SSH 连接复用（加速多任务）
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=no
pipelining = True
control_path = /tmp/ansible-ssh-%%h-%%p-%%r
